# PyTorch Lightning Trainer settings.
# These override training/default.yaml when +training=lightning is used.
accelerator: auto
devices: 1
precision: 32
gradient_clip_val: null         # max gradient norm (null = disabled)
enable_progress_bar: false      # set false to suppress all progress bars
enable_model_summary: true      # set false to suppress model summary table
progress_refresh_rate: 1        # batches between progress bar updates

# Logging / verbosity ----------------------------------------
logging:
  level: info
